name: Build and publish

on: 
  push:
    branches:
      - "master" # Running this workflow only for master branch

jobs:
  build-and-publish-head:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3.5.0 # Checking out the repo

    - name: Build and publish "head" Docker image
      uses: VaultVulp/gp-docker-action@1.6.0
      with:
        github-token: ${{ secrets.PUBLISH_TOKEN }} # Provide PUBLISH_TOKEN to login into the GitHub Packages
        image-name: brother-scanner # Provide Docker image name
        image-tag: latest # Provide Docker image tag